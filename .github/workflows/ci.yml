# SPDX-License-Identifier: MIT
# Telegram Automation Bot — GitHub Actions CI/CD Pipeline

name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          pip install --no-cache-dir -r requirements.txt

      - name: Run unit tests
        run: |
          pytest tests/ -v --tb=short

      - name: Run integration tests
        run: |
          pytest tests/ -v --tb=short -k "integration"

  lint:
    name: Lint Code
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install --no-cache-dir flake8 black

      - name: Check code formatting
        run: |
          black --check src/ tests/

      - name: Run flake8
        run: |
          flake8 src/ tests/ --max-line-length=100 || true

  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: [test, lint]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: |
          docker build -t telegram-automation-bot:${{ github.sha }} .

      - name: Test Docker image health
        run: |
          docker run -d --name test-bot telegram-automation-bot:${{ github.sha }}
          sleep 5
          docker logs test-bot
          docker stop test-bot

  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: [build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Push to registry
        run: |
          echo "${{ secrets.DOCKER_PAT }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
          docker tag telegram-automation-bot:${{ github.sha }} ghcr.io/niccolocoppo88/telegram-automation-bot:${{ github.sha }}
          docker push ghcr.io/niccolocoppo88/telegram-automation-bot:${{ github.sha }}

      - name: Deploy via SSH
        uses: apple-actions/ssh-build-push-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          port: ${{ secrets.VPS_PORT }}
          key: ${{ secrets.VPS_SSH_KEY }}
          command: |
            cd /opt/telegram-bot
            docker-compose pull
            docker-compose up -d
            docker image prune -f
